name: Build AlMahmoudia APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-apk:
    name: "🏗️ Build Debug APK"
    runs-on: ubuntu-24.04

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v5

      - name: "☕ Set up Java 17 (Fixes gradlew failed!)"
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: "🔧 Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "📦 Install System Dependencies"
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          pip install --upgrade Cython==0.29.33 virtualenv buildozer

      - name: "🔨 Build with Buildozer"
        run: |
          yes | buildozer android debug

      - name: "📦 Upload APK Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: AlMahmoudia-App-Debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error
